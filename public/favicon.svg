<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="7" fill="#0c1524"/>

  <!-- Hexagon outline -->
  <polygon
    points="16,3 27,9 27,23 16,29 5,23 5,9"
    fill="none"
    stroke="#22d3ee"
    stroke-width="1.8"
    stroke-linejoin="round"
  />

  <!-- Inner glow hex -->
  <polygon
    points="16,7 23.5,11.5 23.5,20.5 16,25 8.5,20.5 8.5,11.5"
    fill="rgba(34,211,238,0.08)"
    stroke="rgba(34,211,238,0.3)"
    stroke-width="0.8"
    stroke-linejoin="round"
  />

  <!-- Centre dot -->
  <circle cx="16" cy="16" r="2.5" fill="#22d3ee" opacity="0.9"/>

  <!-- Scan lines (horizontal) -->
  <line x1="9"  y1="13" x2="23" y2="13" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
  <line x1="9"  y1="16" x2="23" y2="16" stroke="#22d3ee" stroke-width="0.8" opacity="0.25"/>
  <line x1="9"  y1="19" x2="23" y2="19" stroke="#22d3ee" stroke-width="0.8" opacity="0.4"/>
</svg>
